<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ALAN STUDIO | AI Content Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
        }
        .card-cyber {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-gold {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        .btn-gold:hover {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="text-white min-h-screen p-6 md:p-12">

    <div class="max-w-3xl mx-auto space-y-10">
        
        <div class="text-center">
            <h1 class="text-6xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500 italic">
                ALAN STUDIO
            </h1>
            <div class="mt-2 inline-block px-3 py-1 rounded-full border border-yellow-500/30 bg-yellow-500/10">
                <span class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Premium Content SaaS</span>
            </div>
        </div>

        <div class="card-cyber p-8 rounded-3xl shadow-2xl">
            <div class="flex items-center gap-3 mb-6">
                <div class="h-8 w-1 bg-yellow-500 rounded-full"></div>
                <h2 class="text-xl font-bold tracking-tight">AI VIRAL HOOK GENERATOR</h2>
            </div>
            
            <div class="space-y-5">
                <input id="topic" type="text" placeholder="Masukkan topik konten (Contoh: Sejarah Majapahit)" 
                       class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-yellow-500 transition-all text-white">
                
                <button onclick="generateHook()" id="btnHook" class="w-full btn-gold font-bold py-4 rounded-xl transition-all">
                    GENERATE HOOK SEKARANG
                </button>
            </div>

            <div id="hookBox" class="mt-6 p-5 bg-black/40 border border-white/5 rounded-2xl hidden">
                <p id="hookText" class="text-sm leading-relaxed text-gray-300 italic whitespace-pre-line"></p>
            </div>
        </div>

        <div class="card-cyber p-8 rounded-3xl shadow-2xl">
            <div class="flex items-center gap-3 mb-6">
                <div class="h-8 w-1 bg-green-500 rounded-full"></div>
                <h2 class="text-xl font-bold tracking-tight">PREMIUM NARRATOR (DOWNLOAD MP3)</h2>
            </div>

            <div class="space-y-5">
                <textarea id="ttsInput" rows="5" placeholder="Tempel narasi video di sini..." 
                          class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-green-500 transition-all text-white"></textarea>
                
                <button onclick="generateAudio()" id="btnAudio" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl transition-all">
                    PROSES SUARA PREMIUM
                </button>
            </div>

            <div id="audioPlayerBox" class="mt-6 p-6 bg-black/40 rounded-2xl border border-white/5 hidden">
                <audio id="audioElement" controls class="w-full mb-4"></audio>
                <a id="downloadBtn" href="#" download="AlanStudio_Voice.mp3" 
                   class="flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl text-sm transition-all">
                    DOWNLOAD HASIL AUDIO (.MP3)
                </a>
            </div>
        </div>

        <div class="text-center text-[10px] text-gray-600 font-bold tracking-widest uppercase">
            Alan Studio Digital Project • All Rights Reserved 2026
        </div>
    </div>

    <script>
        // Logika Hook
        async function generateHook() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('btnHook');
            if(!topic) return alert("Topik belum diisi!");
            
            btn.innerText = "SEDANG BERPIKIR...";
            try {
                const res = await fetch(`/api/hook?topic=${encodeURIComponent(topic)}`);
                const data = await res.json();
                document.getElementById('hookBox').classList.remove('hidden');
                document.getElementById('hookText').innerText = data.hook || "Error: Cek API Key!";
            } finally {
                btn.innerText = "GENERATE HOOK SEKARANG";
            }
        }

        // Logika TTS Premium
        async function generateAudio() {
            const text = document.getElementById('ttsInput').value;
            const btn = document.getElementById('btnAudio');
            if(!text) return alert("Narasi kosong!");

            btn.innerText = "MENGOLAH SUARA...";
            try {
                const res = await fetch(`/api/tts?text=${encodeURIComponent(text)}`);
                const data = await res.json();
                if(data.audioUrl) {
                    document.getElementById('audioPlayerBox').classList.remove('hidden');
                    document.getElementById('audioElement').src = data.audioUrl;
                    document.getElementById('downloadBtn').href = data.audioUrl;
                    document.getElementById('audioElement').play();
                }
            } finally {
                btn.innerText = "PROSES SUARA PREMIUM";
            }
        }
    </script>
</body>
</html>
