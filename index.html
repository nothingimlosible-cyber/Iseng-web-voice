<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ALAN STUDIO | Premium AI</title>
    <style>
        body { background: #000; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-white p-6">
    <div class="max-w-xl mx-auto space-y-8">
        <h1 class="text-4xl font-black text-center text-yellow-500 italic">ALAN STUDIO</h1>

        <div class="glass p-6 rounded-3xl">
            <h2 class="font-bold mb-4">🔥 VIRAL HOOK GENERATOR</h2>
            <input id="topic" type="text" placeholder="Topik sejarah/affiliate..." class="w-full bg-white/5 p-4 rounded-xl mb-4 outline-none border border-white/10">
            <button onclick="doHook()" id="btnH" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl">GENERATE HOOK</button>
            <div id="hBox" class="mt-4 p-4 bg-black/40 rounded-xl hidden text-sm italic text-gray-300"></div>
        </div>

        <div class="glass p-6 rounded-3xl">
            <h2 class="font-bold mb-4">🎙️ PREMIUM NARRATOR AI</h2>
            <textarea id="ttsT" rows="4" placeholder="Narasi konten..." class="w-full bg-white/5 p-4 rounded-xl mb-4 outline-none border border-white/10"></textarea>
            
            <select id="vSel" class="w-full bg-gray-800 p-4 rounded-xl mb-4 text-sm">
                <option value="id-ID-ArdiNeural">🎙️ Narator Cowok (Pro)</option>
                <option value="id-ID-GadisNeural">🎙️ Narator Cewek (Pro)</option>
            </select>

            <button onclick="doTTS()" id="btnT" class="w-full bg-green-600 font-bold py-4 rounded-xl mb-4 text-white">PROSES SUARA</button>

            <div id="aBox" class="hidden p-4 bg-black/40 rounded-xl border border-white/5 text-center">
                <audio id="aud" controls class="w-full mb-4"></audio>
                <a id="dl" href="#" download="AlanStudio.mp3" class="text-blue-400 font-bold text-sm underline">DOWNLOAD MP3</a>
            </div>
        </div>
    </div>

    <script>
        async function doHook() {
            const t = document.getElementById('topic').value;
            if(!t) return alert("Isi topik!");
            document.getElementById('btnH').innerText = "MIKIR...";
            const res = await fetch(`/api/hook?topic=${encodeURIComponent(t)}`);
            const d = await res.json();
            document.getElementById('hBox').classList.remove('hidden');
            document.getElementById('hBox').innerText = d.hook || d.error;
            document.getElementById('btnH').innerText = "GENERATE HOOK";
        }

        async function doTTS() {
            const t = document.getElementById('ttsT').value;
            const v = document.getElementById('vSel').value;
            if(!t) return alert("Isi teks!");
            document.getElementById('btnT').innerText = "PROSES...";
            const res = await fetch(`/api/tts?text=${encodeURIComponent(t)}&voice=${v}`);
            const d = await res.json();
            if(d.audioUrl) {
                document.getElementById('aBox').classList.remove('hidden');
                document.getElementById('aud').src = d.audioUrl;
                document.getElementById('dl').href = d.audioUrl;
                document.getElementById('aud').play();
            }
            document.getElementById('btnT').innerText = "PROSES SUARA";
        }
    </script>
</body>
</html>
