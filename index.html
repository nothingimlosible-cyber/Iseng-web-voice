<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Alan Studio - AI Viral Hook</title>
</head>
<body class="bg-black text-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-600 mb-2">Alan Studio</h1>
        <p class="text-gray-400 text-sm mb-6">Bikin konten sejarah atau affiliate jadi viral otomatis.</p>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold uppercase text-gray-500 mb-1 block">Topik Konten</label>
                <input id="topic" type="text" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg focus:outline-none focus:border-yellow-500 transition" placeholder="Misal: Rahasia Gajah Mada">
            </div>
            
            <button onclick="generateHook()" id="btn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-lg transition transform active:scale-95">Minta Hook Viral 🚀</button>
        </div>

        <div id="resultBox" class="mt-8 p-4 bg-gray-800 border-l-4 border-yellow-500 rounded hidden">
            <p id="resultText" class="text-sm leading-relaxed whitespace-pre-line"></p>
        </div>
    </div>

    <script>
        async function generateHook() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('btn');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if(!topic) return alert("Isi topiknya dulu, Bos!");

            btn.innerText = "Lagi Mikir...";
            btn.disabled = true;

            try {
                const res = await fetch(`/api/hook?topic=${encodeURIComponent(topic)}`);
                const data = await res.json();
                
                resultBox.classList.remove('hidden');
                resultText.innerText = data.hook || data.error;
            } catch (e) {
                alert("Error koneksi!");
            } finally {
                btn.innerText = "Minta Hook Viral 🚀";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
